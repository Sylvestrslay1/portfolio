  <!-- Divider -->
  <rect x="120" y="400" width="960" height="2" fill="#10597A" rx="1"/>
  <!-- Tags -->
  <rect x="120" y="432" width="180" height="44" rx="22" fill="#10597A"/>
  <text x="210" y="460" font-family="system-ui,sans-serif" font-size="18" fill="white" text-anchor="middle">Veb-sayt</text>
  <rect x="316" y="432" width="220" height="44" rx="22" fill="#10597A"/>
  <text x="426" y="460" font-family="system-ui,sans-serif" font-size="18" fill="white" text-anchor="middle">Telegram bot</text>
  <rect x="552" y="432" width="140" height="44" rx="22" fill="#10597A"/>
  <text x="622" y="460" font-family="system-ui,sans-serif" font-size="18" fill="white" text-anchor="middle">CMS</text>
  <rect x="708" y="432" width="200" height="44" rx="22" fill="#10597A"/>
  <text x="808" y="460" font-family="system-ui,sans-serif" font-size="18" fill="white" text-anchor="middle">WebApp</text>

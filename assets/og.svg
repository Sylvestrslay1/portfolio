<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0E2A30"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.08"/>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect x="12" y="12" width="24" height="24" fill="none" stroke="#2C9C92" stroke-width="1"/>
      <rect x="12" y="12" width="24" height="24" fill="none" stroke="#2C9C92" stroke-width="1" transform="rotate(45 24 24)"/>
    </pattern>
  </defs>
  <!-- Avatar circle -->
  <circle cx="160" cy="315" r="72" fill="#10597A"/>
  <text x="160" y="332" font-family="system-ui,sans-serif" font-weight="800" font-size="48" fill="white" text-anchor="middle">OI</text>
  <!-- Name -->
  <text x="272" y="290" font-family="system-ui,sans-serif" font-weight="800" font-size="52" fill="white">Otabek Inagamov</text>
  <!-- Role -->
